
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carrito de Compras</title>
  <!-- Bootstrap 5 CDN -->
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <style>
    .producto {
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 10px;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body class="bg-light">

  <div class="container py-5">
    <h2 class="mb-4 text-center">🛒 Carrito de Compras</h2>

    <div class="mb-3 d-flex gap-2">
      <input type="text" id="nombreProducto" class="form-control" placeholder="Nombre del producto">
      <button onclick="agregarProducto()" class="btn btn-success">Agregar</button>
      <button onclick="eliminarProducto()" class="btn btn-danger">Eliminar último</button>
    </div>

    <div id="carrito" class="mt-4">
      <!-- Aquí aparecerán los productos -->
    </div>
  </div>

  <script>
    function agregarProducto() {
      const input = document.getElementById('nombreProducto');
      const nombre = input.value.trim();

      if (nombre === "") {
        alert("Por favor ingresa un nombre de producto.");
        return;
      }

      const producto = document.createElement('div');
      producto.className = 'producto bg-success';
      producto.innerText = nombre;

      // Agrega al carrito
      document.getElementById('carrito').appendChild(producto);

      // Limpiar input
      input.value = '';

      // Efecto visual por unos segundos
      setTimeout(() => {
        producto.classList.remove('bg-success');
        producto.classList.add('bg-primary');
      }, 1000);
    }

    function eliminarProducto() {
      const carrito = document.getElementById('carrito');
      const productos = carrito.getElementsByClassName('producto');

      if (productos.length === 0) {
        alert("No hay productos para eliminar.");
        return;
      }

      const ultimo = productos[productos.length - 1];

      // Cambiar color a rojo antes de eliminar
      ultimo.classList.remove('bg-primary');
      ultimo.classList.add('bg-danger');

      // Esperar un momento antes de quitarlo del DOM
      setTimeout(() => {
        carrito.removeChild(ultimo);
      }, 500);
    }
  </script>

</body>
</html>
